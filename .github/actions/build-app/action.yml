name: Build App
description: Node setup, install dependencies, and build production app
inputs:
  version:
    description: Package version to set (e.g. from tag). When provided, updates package.json before build.
    required: false
  apple_id:
    description: Apple ID to use for notarization.
    required: false
  apple_app_specific_password:
    description: Apple App Specific Password to use for notarization.
    required: false
  apple_team_id:
    description: Apple Team ID to use for notarization.
    required: false
  apple_certificate_base64:
    description: Base64-encoded .p12 signing certificate (for codesign). Not the same as Apple ID.
    required: false
  apple_certificate_password:
    description: Password for the .p12 certificate (set when exporting from Keychain). May differ from app-specific password.
    required: false
  gh_token:
    description: GitHub token to use for authentication.
    required: false
  auto_update_url:
    description: Base URL for the auto-updater feed. Baked into the main bundle and used as the electron-builder generic publish url.
    required: true
  environments:
    description: JSON environment catalog (VITE_ENVIRONMENTS) baked into the renderer at build time. The app fails to boot without it.
    required: true
  firebase_api_key:
    description: Firebase Remote Config client apiKey (public client id). Required for Remote Config; the app has no config fallback without it.
    required: true
  firebase_project_id:
    description: Firebase Remote Config projectId (public client id).
    required: true
  firebase_app_id:
    description: Firebase Remote Config appId (public client id).
    required: true
  webrtc_turn_host:
    description: WebRTC TURN relay host for P2P chat.
    required: true
  webrtc_turn_secret:
    description: WebRTC TURN relay secret for P2P chat.
    required: true
  webrtc_turn_ttl:
    description: WebRTC TURN relay secret TTL in seconds for P2P chat.
    required: true
  include_dist_artifacts:
    description: Include dist artifacts in artifacts.
    required: false
    default: false
  arch:
    description: Electron-builder arch flag for Linux (e.g. --x64 or --arm64). When set, only builds Linux for that arch.
    required: false
  artifact_suffix:
    description: Suffix for artifact name to avoid collisions (e.g. Linux-arm64). When empty, uses runner.os.
    required: false
  sentry_dsn:
    description: Sentry DSN. Required when sentry_required is true.
    required: false
  sentry_auth_token:
    description: Sentry auth token for source-map upload. Required when sentry_required is true.
    required: false
  sentry_org:
    description: Sentry organization slug. Required when sentry_required is true.
    required: false
  sentry_project:
    description: Sentry project slug. Required when sentry_required is true.
    required: false
  sentry_required:
    description: When 'true', fail the job if any sentry_* input is empty.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Verify Sentry secrets
      if: inputs.sentry_required == 'true'
      shell: bash
      run: |
        set -e
        missing=()
        [ -z "${{ inputs.sentry_dsn }}" ] && missing+=("sentry_dsn")
        [ -z "${{ inputs.sentry_auth_token }}" ] && missing+=("sentry_auth_token")
        [ -z "${{ inputs.sentry_org }}" ] && missing+=("sentry_org")
        [ -z "${{ inputs.sentry_project }}" ] && missing+=("sentry_project")
        if [ ${#missing[@]} -gt 0 ]; then
          echo "Missing required Sentry inputs: ${missing[*]}"
          exit 1
        fi

    - name: Node
      uses: ./.github/actions/setup-node

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Update package.json version from tag
      if: inputs.version != ''
      id: set-version
      shell: bash
      run: |
        npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version
        echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

    - name: Add MacOS certs
      if: runner.os == 'macOS' && inputs.apple_certificate_base64 != ''
      shell: bash
      run: chmod +x .github/add_cert_in_keychain.sh && .github/add_cert_in_keychain.sh
      env:
        CERTIFICATE_OSX_APPLICATION: ${{ inputs.apple_certificate_base64 }}
        CERTIFICATE_PASSWORD: ${{ inputs.apple_certificate_password }}

    - name: Build application
      shell: bash
      run: npm run r clean:build clean:prod build postbuild
      env:
        BUILD_SOURCE: s3
        AUTO_UPDATE_URL: ${{ inputs.auto_update_url }}
        VITE_ENVIRONMENTS: ${{ inputs.environments }}
        VITE_FIREBASE_API_KEY: ${{ inputs.firebase_api_key }}
        VITE_FIREBASE_PROJECT_ID: ${{ inputs.firebase_project_id }}
        VITE_FIREBASE_APP_ID: ${{ inputs.firebase_app_id }}
        VITE_WEBRTC_TURN_HOST: ${{ inputs.webrtc_turn_host }}
        VITE_WEBRTC_TURN_SECRET: ${{ inputs.webrtc_turn_secret }}
        VITE_WEBRTC_TURN_TTL: ${{ inputs.webrtc_turn_ttl }}
        SENTRY_DSN: ${{ inputs.sentry_dsn }}
        SENTRY_AUTH_TOKEN: ${{ inputs.sentry_auth_token }}
        SENTRY_ORG: ${{ inputs.sentry_org }}
        SENTRY_PROJECT: ${{ inputs.sentry_project }}

    - name: Include dist artifacts
      if: inputs.include_dist_artifacts == true || inputs.include_dist_artifacts == 'true'
      shell: bash
      run: npm run dist -- ${{ inputs.arch }}
      env:
        APPLE_ID: ${{ inputs.apple_id }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ inputs.apple_app_specific_password }}
        APPLE_TEAM_ID: ${{ inputs.apple_team_id }}
        GH_TOKEN: ${{ inputs.gh_token }}
        AUTO_UPDATE_URL: ${{ inputs.auto_update_url }}
        BUILD_SOURCE: s3

    - name: Prepare Linux update metadata for multi-arch
      if: runner.os == 'Linux' && (inputs.include_dist_artifacts == true || inputs.include_dist_artifacts == 'true')
      shell: bash
      run: |
        if [ -f release/dist/latest-linux.yml ]; then
          if [ "${{ inputs.arch }}" = "--x64" ]; then
            cp release/dist/latest-linux.yml release/dist/latest-linux-x64.yml
          elif [ "${{ inputs.arch }}" = "--arm64" ]; then
            cp release/dist/latest-linux.yml release/dist/latest-linux-arm64.yml
          fi
        fi

    - name: Upload dist artifacts
      if: inputs.include_dist_artifacts == true || inputs.include_dist_artifacts == 'true'
      uses: actions/upload-artifact@v6
      with:
        name: build-artifacts-${{ inputs.artifact_suffix || runner.os }}
        path: |
          release/dist/*.exe
          release/dist/*.dmg
          release/dist/*.zip
          release/dist/*.AppImage
          release/dist/*.blockmap
          release/dist/latest.yml
          release/dist/latest-mac.yml
          release/dist/latest-linux*.yml

    - name: Upload build output for E2E
      uses: actions/upload-artifact@v6
      with:
        name: build-output-${{ inputs.artifact_suffix || runner.os }}
        path: release/build
